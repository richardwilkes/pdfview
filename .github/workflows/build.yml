name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Pure Go: one runner per OS plus both architectures on Linux. The parity tests assert exact integer
        # geometry, so keeping amd64 and arm64 in the matrix polices any floating-point divergence between them.
        os: [ubuntu-22.04, ubuntu-22.04-arm, macos-26, windows-2022]
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      # Lint via the official action rather than build.sh's --lint step: the
      # latter downloads golangci-lint through its upstream install.sh, whose
      # checksum verification fails for unauthenticated release downloads in CI.
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest

      # The library must stay buildable without cgo. Enforce that explicitly,
      # since the race-enabled test run below re-enables cgo internally (the
      # race runtime requires it) and so cannot catch a cgo dependency creeping
      # in.
      - name: Verify cgo-free build
        run: CGO_ENABLED=0 go build ./...

      # build.sh builds and runs the tests with the race detector.
      - name: build.sh
        run: ./build.sh --race
